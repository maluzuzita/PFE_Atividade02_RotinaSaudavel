<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Vitalis</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='../CSS/style.css'>
</head>

<body>
    <header>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" class="bi bi-activity"
                viewBox="0 0 16 16">
                <path fill-rule="evenodd"
                    d="M6 2a.5.5 0 0 1 .47.33L10 12.036l1.53-4.208A.5.5 0 0 1 12 7.5h3.5a.5.5 0 0 1 0 1h-3.15l-1.88 5.17a.5.5 0 0 1-.94 0L6 3.964 4.47 8.171A.5.5 0 0 1 4 8.5H.5a.5.5 0 0 1 0-1h3.15l1.88-5.17A.5.5 0 0 1 6 2" />
            </svg>
            Vitalis
        </h1>
        <p class="header-subtitulo"><sub>Rotina Saudável</sub></p>
    </header>

    <div class="centralizar-cartao"> <!-- Centralizar Cartão -->
        <div class="cartao"> <!-- Cartão -->
            <div class="inicio-cartao"> <!-- Titulo e Subtitulo do Cartão -->
                <h2>Habit Tracker</h2>
                <p class="cartao-subtitulo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="16" fill="#52b992"
                        class="bi bi-leaf-fill" viewBox="0 0 16 16">
                        <path
                            d="M1.4 1.7c.217.289.65.84 1.725 1.274 1.093.44 2.885.774 5.834.528 2.02-.168 3.431.51 4.326 1.556C14.161 6.082 14.5 7.41 14.5 8.5q0 .344-.027.734C13.387 8.252 11.877 7.76 10.39 7.5c-2.016-.288-4.188-.445-5.59-2.045-.142-.162-.402-.102-.379.112.108.985 1.104 1.82 1.844 2.308 2.37 1.566 5.772-.118 7.6 3.071.505.8 1.374 2.7 1.75 4.292.07.298-.066.611-.354.715a.7.7 0 0 1-.161.042 1 1 0 0 1-1.08-.794c-.13-.97-.396-1.913-.868-2.77C12.173 13.386 10.565 14 8 14c-1.854 0-3.32-.544-4.45-1.435-1.124-.887-1.889-2.095-2.39-3.383-1-2.562-1-5.536-.65-7.28L.73.806z" />
                    </svg>
                    Cultivando pequenas vitórias todos os dias
                </p>
            </div> <!-- Titulo e Subtitulo do Cartão -->

            <div class="estilo-input-botao"> <!-- Botão exótico -->
            <button class="btn-add" onclick="adicionarHabito()">Adicionar Hábito
            <input type="text" id="inputHabito" placeholder="Planejar minha próxima meta...">
            </button>
            </div> <!-- Botão exótico -->

            <!-- Tabela -->
            <table>
                <thead>
                    <tr>
                        <th>Hábito</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="tabela">

                </tbody>
            </table> <!-- Tabela -->
        </div> <!-- Cartão -->
    </div> <!-- Centralizar Cartão -->

    <script src='../JS/index.js'></script>
</body>

</html>
